services:
  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: bingbingbingo-pg
    environment:
      POSTGRES_USER: bingbingbingo
      POSTGRES_PASSWORD: bingbingbingo_dev
      POSTGRES_DB: bingbingbingo
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bingbingbingo']
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible storage for local dev, simulates OSS)
  minio:
    image: minio/minio:latest
    container_name: bingbingbingo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # Web Console
    volumes:
      - minio_data:/data

  # Redis (for rate limiting)
  redis:
    image: redis:7-alpine
    container_name: bingbingbingo-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # SSE Push Service
  sse:
    build:
      context: .
      dockerfile: apps/sse/Dockerfile
    container_name: bingbingbingo-sse
    ports:
      - '3001:3001'
    environment:
      PORT: '3001'
      NODE_ENV: development
      SSE_TICKET_SECRET: dev-sse-ticket-secret-at-least-32-chars
      SSE_TICKET_EXPIRES_IN: '60'
      INTERNAL_PUSH_SECRET: dev-internal-push-secret
      SSE_HEARTBEAT_INTERVAL: '30'
      SSE_MAX_CONNECTIONS_PER_USER: '5'
      SSE_MAX_CONNECTIONS: '10000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  minio_data:
